<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <style>
        body {
            background: #2c3e50;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; margin: 0;
        }

        .login-box {
            background: #34495e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.5);
            text-align: center; width: 300px;
        }

        .login-box h2 {
            color: #ecf0f1;
            margin-bottom: 30px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 4px;
            background: #ecf0f1;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 4px;
            background: #27ae60;
            color: #fff; font-size:
                16px; cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2ecc71;
        }

        #error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 15px;
            min-height: 20px;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>🐍 贪吃蛇终端</h2>
    <input type="text" id="user" placeholder="输入任意账号">
    <input type="password" id="pass" placeholder="输入任意密码">
    <button id="btn">授权登录</button>
    <div id="error-msg"></div>
</div>

<script>
    document.getElementById('btn').addEventListener('click', () => {
        const user = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value.trim();
        if (user && pass) {
            // 登录成功，重定向到 snake 目录下的游戏页
            window.location.href = '/snake/index.html';
        } else {
            document.getElementById('error-msg').innerText = "账号与密码不能为空！";
        }
    });
</script>
</body>
</html>
