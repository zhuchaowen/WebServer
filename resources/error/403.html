<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Forbidden</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .error-card {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        .error-card h1 {
            font-size: 80px;
            margin: 0;
            color: #e74c3c; /* 红色警告 */
            letter-spacing: 2px;
        }
        .error-card h2 {
            font-size: 24px;
            margin: 10px 0 20px;
            color: #2c3e50;
        }
        .error-card p {
            color: #7f8c8d;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .error-card a {
            display: inline-block;
            padding: 12px 24px;
            background-color: #3498db;
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        .error-card a:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
<div class="error-card">
    <h1>403</h1>
    <h2>Forbidden</h2>
    <p>抱歉，您没有权限访问此资源。<br>服务器理解了您的请求，但拒绝执行。</p>
    <a href="/">返回首页</a>
</div>
</body>
</html>
