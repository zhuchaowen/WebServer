<!DOCTYPE html>

<head>

        body { background: #1a1a2e; color: #f9a826; font-family: sans-serif; text-align: center; padding-top: 20vh; }
        h1 { font-size: 100px; margin: 0; }
        a { display: inline-block; margin-top: 30px; padding: 10px 20px; background: #f9a826; color: #fff; text-decoration: none; border-radius: 5px; }
